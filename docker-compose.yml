services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ams-doc-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ENABLE_API_DOCS: "true"
      EXPOSE_OPENAPI_JSON: "true"
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
