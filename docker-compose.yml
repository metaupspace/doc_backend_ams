services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ams-doc-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}
      EXPOSE_OPENAPI_JSON: ${EXPOSE_OPENAPI_JSON:-false}
      CORS_ORIGIN: ${CORS_ORIGIN}
